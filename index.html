<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Visualizador de PDF</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
    }

    /* Barra no topo */
    .topo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 40px;
      background-color: #e9e9e9;
      border-bottom: 1px solid #ccc;
      display: flex;
      align-items: center;
      padding-left: 10px;
      z-index: 1000;
    }

    /* Imagem pequena no canto esquerdo */
    .topo img {
      height: 25px;
      width: auto;
    }

    /* Área do PDF */
    .conteudo {
      margin-top: 40px;
      height: calc(100vh - 40px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

  <!-- TOPO COM IMAGEM -->
  <div class="topo">
    <img src="rodape.png" alt="Rodapé">
  </div>

  <!-- PDF -->
  <div class="conteudo">
    <iframe src="arquivo.pdf"></iframe>
  </div>

</body>
</html>
