<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Visualizador de PDF</title>

  <style>
    body {
      margin: 0;
      background-color: #ffffff;
    }

    /* Imagem no topo (rodapé visual) */
    .topo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: #fff;
      text-align: center;
      z-index: 1000;
    }

    .topo img {
      width: 100%;
      max-height: 80px; /* ajusta altura */
      object-fit: contain;
    }

    /* Espaço para não cobrir o PDF */
    .conteudo {
      margin-top: 50px;
      height: calc(100vh - 50px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

  <!-- IMAGEM DO RODAPÉ -->
  <div class="topo">
    <img src="rodape.png" alt="Rodapé">
  </div>

  <!-- PDF -->
  <div class="conteudo">
    <iframe src="arquivo.pdf"></iframe>
  </div>

</body>
</html>
