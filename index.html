<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Visualizador de PDF</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
    }

    /* Rodapé no topo (estilo banner) */
    .footer {
      width: 100%;
      background-color: #222;
      color: #fff;
      text-align: center;
      padding: 15px;
      font-size: 18px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
    }

    /* Espaço para não cobrir o PDF */
    .content {
      margin-top: 60px;
      height: calc(100vh - 60px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

  <!-- Rodapé / topo -->
  <div class="footer">
    SEU RODAPÉ AQUI (ex: © 2026 - Meu Projeto)
  </div>

  <!-- PDF -->
  <div class="content">
    <iframe src="seu-arquivo.pdf"></iframe>
  </div>

</body>
</html>
